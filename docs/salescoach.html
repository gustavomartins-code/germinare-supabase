<style>

:root{--bg:#0d0f12;--surface:#161a1f;--surface2:#1e2329;--border:#2a2f38;--text:#e8ecf0;--muted:#6b7a8d;--accent:#25d366;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;--highlight:rgba(37,211,102,0.12)}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.3px}
.topbar-title span{color:var(--accent)}
.topbar-meta{display:flex;gap:10px;align-items:center}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--muted);font-weight:500}
.pill.alert{border-color:rgba(239,68,68,.4);color:var(--danger);background:rgba(239,68,68,.08)}
.app-layout{display:flex;flex:1;overflow:hidden}
.conv-list{width:290px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.conv-list-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.conv-list-header h3{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:'DM Sans',sans-serif}
.search-box input::placeholder{color:var(--muted)}
.conv-items{flex:1;overflow-y:auto;padding:6px 0}
.conv-item{padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.conv-item:hover{background:var(--surface2)}
.conv-item.active{background:var(--highlight);border-left-color:var(--accent)}
.conv-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.conv-name{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.conv-time{font-size:10.5px;color:var(--muted);flex-shrink:0}
.conv-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.conv-footer{display:flex;justify-content:space-between;align-items:center}
.score-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.score-good{background:rgba(37,211,102,.15);color:var(--accent)}
.score-mid{background:rgba(245,158,11,.15);color:var(--warn)}
.score-low{background:rgba(239,68,68,.12);color:var(--danger)}
.neg-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);color:var(--accent)}
.conv-main{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.conv-header{padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.conv-header-left{display:flex;align-items:center;gap:10px}
.contact-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.contact-info h4{font-size:13.5px;font-weight:600}
.contact-info p{font-size:11px;color:var(--muted)}
.status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.sp-Fechado{background:rgba(37,211,102,.15);color:var(--accent)}
.sp-Emandamento{background:rgba(59,130,246,.15);color:var(--info)}
.sp-Travado{background:rgba(245,158,11,.15);color:var(--warn)}
.sp-Perdido{background:rgba(239,68,68,.12);color:var(--danger)}
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.day-sep{display:flex;align-items:center;gap:8px;margin:2px 0 6px}
.day-sep-line{flex:1;height:1px;background:var(--border)}
.day-sep-label{font-size:10.5px;color:var(--muted);background:var(--surface2);padding:2px 10px;border-radius:10px;border:1px solid var(--border)}
.msg-row{display:flex;gap:6px;max-width:80%}
.msg-row.sent{align-self:flex-end;flex-direction:row-reverse}
.msg-row.received{align-self:flex-start}
.msg-meta{font-size:10px;color:var(--muted);margin-bottom:2px;padding:0 4px}
.msg-row.sent .msg-meta{text-align:right}
.msg-bubble{padding:9px 13px;border-radius:12px;font-size:12.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg-row.sent .msg-bubble{background:#1d4a2e;border-bottom-right-radius:3px}
.msg-row.received .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
.followup-area{border-top:1px solid var(--border);padding:10px 18px;background:var(--surface);flex-shrink:0}
.followup-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.followup-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:12px;line-height:1.5;color:var(--text);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.followup-box span{flex:1}
.copy-btn{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(37,211,102,.15);color:var(--accent);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;flex-shrink:0}
.synthesis-panel{width:280px;flex-shrink:0;background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.synth-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.synth-header h3{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.score-display{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-num{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;line-height:1}
.score-info{flex:1}
.score-label{font-size:11.5px;font-weight:600;margin-bottom:3px}
.score-bar-bg{height:4px;background:var(--border);border-radius:2px}
.score-bar-fill{height:4px;border-radius:2px}
.synth-body{flex:1;overflow-y:auto;padding:0 14px 14px}
.synth-section{margin-bottom:14px}
.synth-section h5{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;margin-top:12px}
.summary-text{font-size:11.5px;color:#b0bac6;line-height:1.6}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.metric-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:2px}
.metric-value{font-size:13px;font-weight:700;font-family:'Syne',sans-serif}
.improve-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:5px}
.improve-item.good{border-left:3px solid var(--accent)}
.improve-item.warn{border-left:3px solid var(--warn)}
.improve-item.bad{border-left:3px solid var(--danger)}
.improve-label{font-size:10px;font-weight:700;margin-bottom:3px}
.il-good{color:var(--accent)}.il-warn{color:var(--warn)}.il-bad{color:var(--danger)}
.improve-title{font-size:11.5px;font-weight:600;margin-bottom:3px}
.improve-text{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.4}
.improve-tip{font-size:11px;color:#b0bac6;background:rgba(255,255,255,.03);border-radius:4px;padding:4px 7px;border:1px solid var(--border);line-height:1.4}
.obj-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:5px}
.obj-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 5px;border-radius:4px;flex-shrink:0}
.obj-label.dada{background:rgba(239,68,68,.15);color:var(--danger)}
.obj-label.ideal{background:rgba(37,211,102,.15);color:var(--accent)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted)}
</style>
</head>

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scoreColor(s){return s>=8?'var(--accent)':s>=5?'var(--warn)':'var(--danger)'}
function scoreClass(s){return s>=8?'score-good':s>=5?'score-mid':'score-low'}
function renderList(f){
  f=(f||'').toLowerCase();
  document.getElementById('convList').innerHTML=CONVS.filter(c=>!f||c.chat.toLowerCase().includes(f)).map(c=>{
    var hasNeg=c.score>=4&&c.produto!='N/A'&&c.produto!='BidPulse'&&c.produto!='Marketing interno';
    return '<div class="conv-item" id="ci-'+c.id+'" onclick="openConv('+c.id+')">'
      +'<div class="conv-item-top"><span class="conv-name">'+esc(c.chat)+'</span><span class="conv-time">'+c.time+'</span></div>'
      +'<div class="conv-preview">'+esc(c.preview)+'</div>'
      +'<div class="conv-footer"><span class="score-badge '+scoreClass(c.score)+'">&#9670; '+c.score+'</span>'
      +(hasNeg?'<span class="neg-tag">'+esc(c.produto)+'</span>':'<span style="font-size:10px;color:var(--muted)">'+c.msgs+' msgs</span>')
      +'</div></div>';
  }).join('');
}

    +'<div class="messages-area" id="msgsArea">'
    +'<div class="day-sep"><div class="day-sep-line"></div><div class="day-sep-label">2026-05-13</div><div class="day-sep-line"></div></div>'
    +(c.messages&&c.messages.length?c.messages.map(m=>'<div class="msg-row '+(m.from_me?'sent':'received')+'"><div><div class="msg-meta">'+esc(m.sender)+' &middot; '+esc(m.time)+'</div><div class="msg-bubble">'+esc(m.text)+'</div></div></div>').join(''):'<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">Sem mensagens</div>')
    +'</div>'
    +'<div class="followup-area"><div class="followup-label">&#128172; Follow-up sugerido pela IA</div>'
    +'<div class="followup-box"><span id="followupText">'+esc(c.followupMsg)+'</span><button class="copy-btn" onclick="copyFollowup()">Copiar</button></div></div>';
  var ma=document.getElementById('msgsArea');if(ma)ma.scrollTop=ma.scrollHeight;
  renderSynth(c);
}
function renderSynth(c){
  document.getElementById('synthName').textContent=c.chat;
  var color=scoreColor(c.score),pct=Math.round(c.score*10);
  var html='<div class="score-display"><div class="score-num" style="color:'+color+'">'+c.score+'</div>'
    +'<div class="score-info"><div class="score-label" style="color:'+color+'">'+esc(c.scoreLabel)+'</div>'
    +'<div class="score-bar-bg"><div class="score-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div></div>'
    +'<div class="summary-text" style="margin-bottom:14px">'+esc(c.summary)+'</div>';
  html+='<h5 style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">&#128202; Metricas</h5>'
    +'<div class="metrics-grid">'
    +'<div class="metric-card"><div class="metric-label">Resp. Media</div><div class="metric-value">'+esc(c.metrics.respostaMed)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Msgs</div><div class="metric-value">'+esc(c.metrics.msgs)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Objecoes</div><div class="metric-value">'+esc(c.metrics.objecoes)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Conversao</div><div class="metric-value">'+esc(c.metrics.conversao)+'</div></div></div>';
  if(c.improvements&&c.improvements.length){
    html+='<h5 style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;margin-top:12px">&#127919; Analise</h5>';
    html+=c.improvements.map(imp=>'<div class="improve-item '+imp.type+'">'
      +'<div class="improve-label il-'+imp.type+'">'+esc(imp.label)+'</div>'
      +'<div class="improve-title">'+esc(imp.title)+'</div>'
      +'<div class="improve-text">'+esc(imp.text)+'</div>'
      +'<div class="improve-tip">Dica: '+esc(imp.tip)+'</div></div>').join('');
  }
  if(c.objecoes&&c.objecoes.length){
    html+='<h5 style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;margin-top:12px">&#128737; Objecoes</h5>';
    html+=c.objecoes.map(o=>'<div class="obj-card"><div style="font-size:12px;font-weight:600;margin-bottom:6px">'+esc(o.objecao)+'</div>'
      +'<div style="display:flex;gap:5px;margin-bottom:4px;align-items:flex-start"><span class="obj-label dada">Como reagiu</span><span style="font-size:11px;color:#b0bac6;line-height:1.4;flex:1">'+esc(o.resposta_dada)+'</span></div>'
      +'<div style="display:flex;gap:5px;align-items:flex-start"><span class="obj-label ideal">Ideal</span><span style="font-size:11px;color:#b0bac6;line-height:1.4;flex:1">'+esc(o.resposta_ideal)+'</span></div></div>').join('');
  }
  document.getElementById('synthBody').innerHTML=html;
}
function copyFollowup(){
  var text=document.getElementById('followupText').textContent;
  navigator.clipboard.writeText(text).then(()=>{var btn=document.querySelector('.copy-btn');if(btn){btn.textContent='Copiado';setTimeout(()=>btn.textContent='Copiar',2000)}});
}
renderList();
if(CONVS.length>0)openConv(0);
</script>
</body>
</html>

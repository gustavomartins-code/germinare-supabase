<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesCoach AI - Germinare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
  :root{--bg:#0d0f12;--surface:#161a1f;--surface2:#1e2329;--border:#2a2f38;--text:#e8ecf0;--muted:#6b7a8d;--accent:#25d366;--accent2:#128c7e;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;--highlight:rgba(37,211,102,0.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .topbar-brand{display:flex;align-items:center;gap:10px}
  .topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.3px}
  .topbar-title span{color:var(--accent)}
  .topbar-meta{display:flex;gap:12px;align-items:center}
  .pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--muted);font-weight:500}
  .app-layout{display:flex;flex:1;overflow:hidden}
  .conv-list{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .conv-list-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
  .conv-list-header h3{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:10px}
  .search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;align-items:center;gap:8px}
  .search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:'DM Sans',sans-serif}
  .search-box input::placeholder{color:var(--muted)}
  .conv-items{flex:1;overflow-y:auto;padding:8px 0}
  .conv-item{padding:12px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
  .conv-item:hover{background:var(--surface2)}
  .conv-item.active{background:var(--highlight);border-left-color:var(--accent)}
  .conv-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
  .conv-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:175px}
  .conv-time{font-size:11px;color:var(--muted);flex-shrink:0}
  .conv-preview{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
  .conv-footer{display:flex;justify-content:space-between;align-items:center}
  .score-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .score-good{background:rgba(37,211,102,.15);color:var(--accent)}
  .score-mid{background:rgba(245,158,11,.15);color:var(--warn)}
  .score-low{background:rgba(239,68,68,.12);color:var(--danger)}
  .tag-chips{display:flex;gap:4px}
  .tag-chip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv-main{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
  .conv-header{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .conv-header-left{display:flex;align-items:center;gap:12px}
  .contact-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
  .contact-info h4{font-size:14px;font-weight:600}
  .contact-info p{font-size:11px;color:var(--muted)}
  .status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
  .sp-Fechado{background:rgba(37,211,102,.15);color:var(--accent)}
  .sp-Emandamento{background:rgba(59,130,246,.15);color:var(--info)}
  .sp-Travado{background:rgba(245,158,11,.15);color:var(--warn)}
  .sp-Perdido{background:rgba(239,68,68,.12);color:var(--danger)}
  .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
  .day-sep{display:flex;align-items:center;gap:10px;margin:4px 0 8px}
  .day-sep-line{flex:1;height:1px;background:var(--border)}
  .day-sep-label{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 10px;border-radius:10px;border:1px solid var(--border)}
  .msg-row{display:flex;gap:8px;max-width:78%}
  .msg-row.sent{align-self:flex-end;flex-direction:row-reverse}
  .msg-row.received{align-self:flex-start}
  .msg-meta{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}
  .msg-row.sent .msg-meta{text-align:right}
  .msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg-row.sent .msg-bubble{background:#1d4a2e;border-bottom-right-radius:3px}
  .msg-row.received .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
  .followup-area{border-top:1px solid var(--border);padding:12px 20px;background:var(--surface);flex-shrink:0}
  .followup-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .followup-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.55;color:var(--text);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .followup-box span{flex:1}
  .copy-btn{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(37,211,102,.15);color:var(--accent);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;flex-shrink:0}
  .synthesis-panel{width:290px;flex-shrink:0;background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
  .synth-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .synth-header h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
  .score-display{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .score-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1}
  .score-info{flex:1}
  .score-label{font-size:12px;font-weight:600;margin-bottom:4px}
  .score-bar-bg{height:5px;background:var(--border);border-radius:3px}
  .score-bar-fill{height:5px;border-radius:3px}
  .synth-body{flex:1;overflow-y:auto;padding:0 16px 16px}
  .synth-section{margin-bottom:16px}
  .synth-section h5{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
  .summary-text{font-size:12px;color:#b0bac6;line-height:1.6}
  .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .metric-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
  .metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px}
  .metric-value{font-size:14px;font-weight:700;font-family:'Syne',sans-serif}
  .improve-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
  .improve-item.good{border-left:3px solid var(--accent)}
  .improve-item.warn{border-left:3px solid var(--warn)}
  .improve-item.bad{border-left:3px solid var(--danger)}
  .improve-title{font-size:12px;font-weight:600;margin-bottom:4px}
  .improve-text{font-size:11px;color:var(--muted);margin-bottom:5px;line-height:1.4}
  .improve-tip{font-size:11px;color:#b0bac6;background:rgba(255,255,255,.03);border-radius:4px;padding:5px 8px;border:1px solid var(--border);line-height:1.4}
  .il-good{color:var(--accent)} .il-warn{color:var(--warn)} .il-bad{color:var(--danger)}
  .obj-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
  .obj-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px}
  .obj-label.dada{background:rgba(239,68,68,.15);color:var(--danger)}
  .obj-label.ideal{background:rgba(37,211,102,.15);color:var(--accent)}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">&#127807;</div>
    <div class="topbar-title">SalesCoach <span>AI</span> &mdash; Germinare</div>
  </div>
  <div class="topbar-meta">
    <span class="pill">&#128197; 2026-05-13</span>
    <span class="pill">&#10022; 10 contatos analisados</span>
  </div>
</div>
<div class="app-layout">
  <div class="conv-list">
    <div class="conv-list-header">
      <h3>Conversas do Dia</h3>

  </div>
  <div class="synthesis-panel">
    <div class="synth-header">
      <h3>Analise IA</h3>
      <div style="font-size:12px;color:var(--muted)">&mdash; <span id="synthName">Selecione</span></div>
    </div>
    <div class="synth-body" id="synthBody">
      <div style="padding:20px 0;text-align:center;color:var(--muted);font-size:12px">Selecione uma conversa</div>
    </div>
  </div>
</div>
<script>
var CONVS=[{"id": 0, "chat": "Conrado Zanon", "score": 9.0, "scoreLabel": "Lead alta intencao", "summary": "Cliente solicitou cotacao de precos diretamente. Oportunidade clara para coletar BID e negociar com fornecedores.", "status": "Em andamento", "vendedor": "Desconhecido", "produto": "Graos/Racoes", "metrics": {"respostaMed": "N/A", "objecoes": "0", "conversao": "Nao", "msgs": "1"}, "improvements": [{"type": "bad", "label": "Melhora Urgente", "title": "Sem resposta ao pedido de preco", "text": "Conrado pediu preco diretamente e nao ha registro de resposta. Cada minuto sem resposta e chance de perder para concorrente.", "tip": "Responda em menos de 5 minutos: 'Conrado, qual produto e volume? Te passo o melhor preco do dia agora.'", "msgRef": "Tem preco ai"}], "objecoes": [], "followupMsg": "Bom dia Conrado! Qual produto e volume voce precisa? Te passo o melhor preco disponivel hoje agora.", "initials": "CZ", "avatarGrad": "linear-gradient(135deg,#1a5276,#17a589)", "time": "10:17", "preview": "Tem preço aí", "msgs": 1, "tags": ["Preco", "Em andamento"], "messages": [{"from_me": false, "sender": "Conrado Zanon", "time": "10:17", "text": "Tem preço aí"}]}, {"id": 1, "chat": "Cristiane Rocha", "score": 8.5, "scoreLabel": "Agendamento rapido e direto", "summary": "A vendedora conduziu o agendamento de uma reuniao para sexta-feira de forma eficiente e cordial. Status de avanco no funil, aguardando a qualificacao da demanda no encontro marcado.", "status": "Em andamento", "vendedor": "Vanessa", "produto": "Graos e Racoes", "metrics": {"respostaMed": "17min", "objecoes": "0", "conversao": "Parcial", "msgs": "9"}, "improvements": [{"type": "good", "label": "Ponto Forte", "title": "Confirmacao de agenda", "text": "Cristiane respondeu 'vou travar aqui', demonstrando organizacao e valorizacao do tempo de ambas.", "tip": "Sempre que agendar, envie um convite de calendario para reduzir a taxa de no-show.", "msgRef": "vou travar aqui"}, {"type": "warn", "label": "Atencao", "title": "Gatilho de interesse", "text": "A conversa focou apenas no horario, sem mencionar uma oportunidade especifica de mercado ou produto.", "tip": "Tente antecipar um beneficio: 'Quero te mostrar uma ponta de DDG que abriu hoje com preco agressivo'.", "msgRef": "Qual o melhor horario pra vc?"}], "objecoes": [], "followupMsg": "Cristiane, confirmadissimo nosso papo sexta as 09:30. Ja separei as cotacoes atualizadas de DDG e milho para te passar. Ate logo!", "initials": "CR", "avatarGrad": "linear-gradient(135deg,#784212,#d35400)", "time": "10:33", "preview": "[unknown]", "msgs": 9, "tags": ["Agenda", "Em andamento"], "messages": [{"from_me": false, "sender": "Cristiane Rocha", "time": "09:52", "text": "Oieee, bom dia, joia?"}, {"from_me": false, "sender": "Cristiane Rocha", "time": "09:52", "text": "Nessa sexta você tem um tempinho cedo? Qual o melhor horário pra vc?"}, {"from_me": true, "sender": "Vanessa", "time": "10:12", "text": "Oie bom dia"}, {"from_me": true, "sender": "Vanessa", "time": "10:12", "text": "Td joia e vc?"}, {"from_me": true, "sender": "Vanessa", "time": "10:13", "text": "Tenho sim"}, {"from_me": true, "sender": "Vanessa", "time": "10:13", "text": "Pode ser as 9:30?"}, {"from_me": false, "sender": "Cristiane Rocha", "time": "10:27", "text": "[unknown]"}, {"from_me": false, "sender": "Cristiane Rocha", "time": "10:28", "text": "Pode..vou travar aqui"}, {"from_me": true, "sender": "Vanessa", "time": "10:33", "text": "[unknown]"}]}, {"id": 2, "chat": "Gustavo Estagiario Sorna", "score": 7.5, "scoreLabel": "Alinhamento interno em progresso", "summary": "O estagiario apresenta a proposta de valor do BidPulse/SalesCoach para revisao da gestao. Vanessa realiza um ajuste tecnico na terminologia, refinando o posicionamento da Germinare.", "status": "Em andamento", "vendedor": "Gustavo", "produto": "BidPulse / SalesCoach", "metrics": {"respostaMed": "6min", "objecoes": "0", "conversao": "Parcial", "msgs": "3"}, "improvements": [{"type": "good", "label": "Ponto Forte", "title": "Contextualizacao clara", "text": "O estagiario conseguiu resumir bem o volume e a dor da mesa de vendas da Germinare.", "tip": "Utilize esses numeros (10 agentes, 400 clientes) como prova social na abordagem externa.", "msgRef": "centenas de negociacoes"}, {"type": "warn", "label": "Atencao", "title": "Precisao de conceito", "text": "Vanessa corrigiu 'vendedores' por 'agentes' e 'vendas' por 'intermediacao', crucial no modelo de corretagem.", "tip": "No mercado de graos, 'intermediacao' traz mais seguranca juridica e clareza sobre o papel do broker.", "msgRef": "intermediacao de vendas"}], "objecoes": [], "followupMsg": "Vanessa, perfeito o ajuste. Ja alterei para 'agentes' e 'intermediacao'. Podemos avancar com esse texto para a apresentacao oficial ou gostaria de ajustar mais algum detalhe?", "initials": "GS", "avatarGrad": "linear-gradient(135deg,#1b2631,#566573)", "time": "10:55", "preview": "A Germinare opera intermediação de vendas com 10 agentes ati", "msgs": 3, "tags": ["BidPulse", "Interno"], "messages": [{"from_me": false, "sender": "Gustavo Sorna", "time": "10:44", "text": "[image]"}, {"from_me": false, "sender": "Gustavo Sorna", "time": "10:46", "text": "BidPulse — Inteligência de Vendas em Tempo Real para o Agronegócio\n\nA Germinare opera uma mesa de vendas com 10 vendedores ativos, ~400 clientes e centenas de negociações acontecendo simultaneamente via WhatsApp todos os dias. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio já foi perdido.\n\nBidPulse é um sistema de inteligência comercial que captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo e acionável — sem que nenhum vendedor precise fazer nada diferente.\n\nO pipeline funciona em três estágios. O primeiro é um filtro estrutural que elimina conversas irrelevantes. O segundo usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real — menção a preço, volume, BID, proposta ou objeção. O terceiro avalia cada negociação individualmente, gerando um score de 0 a 10, identificando objeções levantadas, avaliando como o vendedor reagiu, e propondo uma mensagem de follow-up pronta para envio imediato.\n\nO resultado chega por e-mail com um resumo visual das negociações do dia e um link para um painel interativo onde o gestor consegue ler a transcrição completa de cada conversa, ver os pontos fortes e as falhas de cada vendedor destacados diretamente nas mensagens, e copiar o follow-up sugerido com um clique.\n\nO sistema já está em produção. Ontem, 13 de maio de 2026, processou 55 contatos, identificou 6 negociações reais e entregou o relatório com avaliação completa de cada uma — tudo de forma automática, sem intervenção humana, em menos de 5 minutos.\n\nO impacto direto é duplo: o gestor recupera negociações que estavam se perdendo em silêncio, e os vendedores recebem feedback específico e contextualizado sobre cada conversa — não uma avaliação genérica, mas uma análise do que foi dito, quando e como deveria ter sido diferente."}, {"from_me": true, "sender": "Vanessa", "time": "10:55", "text": "A Germinare opera intermediação de vendas com 10 agentes ativos e centenas de negociações acontecendo simultaneamente via WhatsApp diariamente. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio ser concluído ou perdido.\n\nNossa solução, criada a partir do G4OS, captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo.\n\nO pipeline funciona em três estágios: \n1. Filtro estrutural que elimina conversas irrelevantes. \n2. ⁠Usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real (menção a preço, volume, produto, BID, proposta ou objeção).\n3. ⁠ Avalia cada negociação individualmente, gerando um score de 0 a function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scoreColor(s){return s>=8?'var(--accent)':s>=6?'var(--warn)':'var(--danger)'}
function scoreClass(s){return s>=8?'score-good':s>=6?'score-mid':'score-low'}
function renderList(f){
  f=(f||'').toLowerCase();
  document.getElementById('convList').innerHTML=CONVS.filter(c=>!f||c.chat.toLowerCase().includes(f)).map(c=>
    '<div class="conv-item" id="ci-'+c.id+'" onclick="openConv('+c.id+')">'
    +'<div class="conv-item-top"><span class="conv-name">'+esc(c.chat)+'</span><span class="conv-time">'+c.time+'</span></div>'
    +'<div class="conv-preview">'+esc(c.preview)+'</div>'
    +'<div class="conv-footer"><span class="score-badge '+scoreClass(c.score)+'">&#9670; '+c.score+'</span>'
    +'<div class="tag-chips">'+c.tags.map(t=>'<span class="tag-chip">'+esc(t)+'</span>').join('')+'</div></div></div>'
  ).join('');
}
function filterList(){renderList(document.getElementById('searchInput').value)}
function openConv(id){
  document.querySelectorAll('.conv-item').forEach(e=>e.classList.remove('active'));
  var el=document.getElementById('ci-'+id); if(el)el.classList.add('active');
  var c=CONVS.find(x=>x.id===id); if(!c)return;
  var spClass='sp-'+c.status.replace(/ /g,'');
  document.getElementById('convMain').innerHTML=
    '<div class="conv-header"><div class="conv-header-left">'
    +'<div class="contact-avatar" style="background:'+esc(c.avatarGrad)+'">'+esc(c.initials)+'</div>'
    +'<div class="contact-info"><h4>'+esc(c.chat)+'</h4><p>'+esc(c.vendedor)+' &middot; '+c.msgs+' msgs</p></div></div>'
    +'<span class="status-pill '+spClass+'">'+esc(c.status)+'</span></div>'
    +'<div class="messages-area" id="msgsArea">'
    +'<div class="day-sep"><div class="day-sep-line"></div><div class="day-sep-label">2026-05-13</div><div class="day-sep-line"></div></div>'
    +(c.messages&&c.messages.length?c.messages.map(m=>{
      var cls=m.from_me?'sent':'received';
      return '<div class="msg-row '+cls+'"><div><div class="msg-meta">'+esc(m.sender)+' &middot; '+esc(m.time)+'</div>'
        +'<div class="msg-bubble">'+esc(m.text)+'</div></div></div>';
    }).join(''):'<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">Sem mensagens</div>')
    +'</div>'
    +'<div class="followup-area"><div class="followup-label">&#128172; Follow-up sugerido pela IA</div>'
    +'<div class="followup-box"><span id="followupText">'+esc(c.followupMsg)+'</span>'
    +'<button class="copy-btn" onclick="copyFollowup()">Copiar</button></div></div>';
  var ma=document.getElementById('msgsArea'); if(ma)ma.scrollTop=ma.scrollHeight;
  renderSynth(c);
}
function renderSynth(c){
  document.getElementById('synthName').textContent=c.chat;
  var color=scoreColor(c.score), pct=Math.round(c.score*10);
  document.getElementById('synthBody').innerHTML=
    '<div class="synth-section"><div class="score-display">'
    +'<div class="score-num" style="color:'+color+'">'+c.score+'</div>'
    +'<div class="score-info"><div class="score-label" style="color:'+color+'">'+esc(c.scoreLabel)+'</div>'
    +'<div class="score-bar-bg"><div class="score-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div></div>'
    +'<div class="summary-text">'+esc(c.summary)+'</div></div>'
    +'<div class="synth-section"><h5>&#128202; Metricas</h5><div class="metrics-grid">'
    +'<div class="metric-card"><div class="metric-label">Resp. Media</div><div class="metric-value">'+esc(c.metrics.respostaMed)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Msgs</div><div class="metric-value">'+esc(c.metrics.msgs)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Objecoes</div><div class="metric-value">'+esc(c.metrics.objecoes)+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Conversao</div><div class="metric-value">'+esc(c.metrics.conversao)+'</div></div>'
    +'</div></div>'
    +(c.improvements&&c.improvements.length?
      '<div class="synth-section"><h5>&#127919; Analise</h5>'
      +c.improvements.filter(imp=>imp&&imp.type).map(imp=>
        '<div class="improve-item '+imp.type+'">'
        +'<span style="font-size:11px;font-weight:700" class="il-'+imp.type+'">'+esc(imp.label)+'</span>'
        +'<div class="improve-title">'+esc(imp.title)+'</div>'
        +'<div class="improve-text">'+esc(imp.text)+'</div>'
        +'<div class="improve-tip">Dica: '+esc(imp.tip)+'</div></div>'
      ).join('')+'</div>':'')
    +(c.objecoes&&c.objecoes.length?
      '<div class="synth-section"><h5>&#128737; Objecoes</h5>'
      +c.objecoes.map(o=>
        '<div class="obj-card"><div style="font-size:12px;font-weight:600;margin-bottom:6px">'+esc(o.objecao)+'</div>'
        +'<div style="display:flex;gap:6px;margin-bottom:4px;align-items:flex-start"><span class="obj-label dada">Como reagiu</span><span style="font-size:11px;color:#b0bac6;line-height:1.4;flex:1">'+esc(o.resposta_dada)+'</span></div>'
        +'<div style="display:flex;gap:6px;align-items:flex-start"><span class="obj-label ideal">Ideal</span><span style="font-size:11px;color:#b0bac6;line-height:1.4;flex:1">'+esc(o.resposta_ideal)+'</span></div></div>'
      ).join('')+'</div>':'');
}
function copyFollowup(){
  var text=document.getElementById('followupText').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    var btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copiado';setTimeout(()=>btn.textContent='Copiar',2000)}
  });
}

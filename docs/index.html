  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
  .conv-meta{flex:1;min-width:0}

  .msg-row.me .bubble{background:rgba(37,211,102,.18);border-bottom-right-radius:4px}

  .bubble .msg-time{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}

  .imp-card{background:var(--card);border-radius:8px;padding:12px;border-left:3px solid}

  .imp-card.bad{border-color:var(--danger)}

  .imp-text{font-size:11.5px;color:#b0bac6;margin-bottom:4px}

rue, "sender": "Eu", "time": "19:39", "text": "Responder o formulario"}, {"from_me": true, "sender": "Eu", "time": "19:50", "text": "[sticker]"}, {"from_me": false, "sender": "Gustavo Sorna", "time": "19:56", "text": "[sticker]"}, {"from_me": false, "sender": "Gustavo Sorna", "time": "10:44", "text": "[image]"}, {"from_me": false, "sender": "Gustavo Sorna", "time": "10:46", "text": "BidPulse — Inteligência de Vendas em Tempo Real para o Agronegócio\n\nA Germinare opera uma mesa de vendas com 10 vendedores ativos, ~400 clientes e centenas de negociações acontecendo simultaneamente via WhatsApp todos os dias. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio já foi perdido.\n\nBidPulse é um sistema de inteligência comercial que captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo e acionável — sem que nenhum vendedor precise fazer nada diferente.\n\nO pipeline funciona em três estágios. O primeiro é um filtro estrutural que elimina conversas irrelevantes. O segundo usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real — menção a preço, volume, BID, proposta ou objeção. O terceiro avalia cada negociação individualmente, gerando um score de 0 a 10, identificando objeções levantadas, avaliando como o vendedor reagiu, e propondo uma mensagem de follow-up pronta para envio imediato.\n\nO resultado chega por e-mail com um resumo visual das negociações do dia e um link para um painel interativo onde o gestor consegue ler a transcrição completa de cada conversa, ver os pontos fortes e as falhas de cada vendedor destacados diretamente nas mensagens, e copiar o follow-up sugerido com um clique.\n\nO sistema já está em produção. Ontem, 13 de maio de 2026, processou 55 contatos, identificou 6 negociações reais e entregou o relatório com avaliação completa de cada uma — tudo de forma automática, sem intervenção humana, em menos de 5 minutos.\n\nO impacto direto é duplo: o gestor recupera negociações que estavam se perdendo em silêncio, e os vendedores recebem feedback específico e contextualizado sobre cada conversa — não uma avaliação genérica, mas uma análise do que foi dito, quando e como deveria ter sido diferente."}, {"from_me": true, "sender": "Eu", "time": "10:55", "text": "A Germinare opera intermediação de vendas com 10 agentes ativos e centenas de negociações acontecendo simultaneamente via WhatsApp diariamente. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio ser concluído ou perdido.\n\nNossa solução, criada a partir do G4OS, captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo.\n\nO pipeline funciona em três estágios: \n1. Filtro estrutural que elimina conversas irrelevantes. \n2. ⁠Usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real (menção a preço, volume, produto, BID, proposta ou objeção).\n3. ⁠ Avalia cada negociação individualmente, gerando um score de 0 a 10, identificando objeções levantadas, avaliando como o vendedor reagiu, com um resumo analítico sobre a negociação e propondo uma mensagem de follow-up pronta para envio imediato.\n4. ⁠Enviado por e-mail um consolidado visual das negociações do dia e um link para um painel interativo onde o gestor consegue ler a transcrição completa de cada conversa, ver os pontos fortes e as falhas de cada vendedor destacados diretamente nas mensagens, e o follow-up sugerido.\n\nO sistema já está em produção. Ontem, processou 55 contatos, identificou 6 negociações reais e entregou o relatório com avaliação completa de cada uma — tudo de forma automática, sem intervenção humana, em menos de 5 minutos.\n\nO impacto direto é duplo: o gestor recupera negociações que estavam se perdendo em silêncio, e os vendedores recebem feedback esp let active=-1;

function scoreColor(s){return s>=8?'#25d366':s>=6?'#f59e0b':'#ef4444'}
function statusStyle(st){const m={'Fechado':['#25d366','rgba(37,211,102,.15)'],'Em andamento':['#3b82f6','rgba(59,130,246,.15)'],'Travado':['#f59e0b','rgba(245,158,11,.15)'],'Perdido':['#ef4444','rgba(239,68,68,.12)']};return m[st]||['#6b7a8d','#1e2329']}

function buildList(list){
  const el=document.getElementById('conv-list');
  el.innerHTML='';
  document.getElementById('count-badge').textContent=list.length+' conversas';
  list.forEach(c=>{
    const col=scoreColor(c.score);
    const isUrgent=c.status==='Travado'&&c.produto!=='N/A'&&c.produto!=='Marketing interno'&&c.produto!=='BidPulse';
    const d=document.createElement('div');
    d.className='conv-item'+(isUrgent?' urgent-item':'');
    d.id='ci-'+c.id;
    d.onclick=()=>openConv(c.id);
    d.innerHTML=`<div class="avatar" style="background:${c.avatarGrad}">${c.initials}</div>
    <div class="conv-meta">
      <div class="conv-name">${c.chat}${isUrgent?'<span class="urgent-badge">URGENTE</span>':''}</div>
      <div class="conv-preview">${c.preview}</div>
    </div>
    <div class="conv-right">
      <div class="conv-time">${c.time}</div>
      ${c.score>0?`<div class="score-badge" style="color:${col}">${c.score}</div>`:''}
    </div>`;
    el.appendChild(d);
  });
}

function openConv(id){
  if(active>=0){const prev=document.getElementById('ci-'+active);if(prev)prev.classList.remove('active')}
  active=id;
  const c=CONVS.find(x=>x.id===id);
  const ci=document.getElementById('ci-'+id);
  if(ci)ci.classList.add('active');
  document.getElementById('empty').style.display='none';
  const cv=document.getElementById('chat-view');cv.style.display='flex';
  // header
  const av=document.getElementById('ch-avatar');av.style.background=c.avatarGrad;av.textContent=c.initials;
  document.getElementById('ch-name').textContent=c.chat;
  document.getElementById('ch-meta').textContent=c.msgs+' msgs · '+c.vendedor+' · '+c.produto;
  // chat
  const tc=document.getElementById('tab-chat');tc.innerHTML='';
  (c.messages||[]).forEach(m=>{
    const row=document.createElement('div');row.className='msg-row'+(m.from_me?' me':'');
    row.innerHTML=`<div class="bubble">${!m.from_me?`<div class="sender">${m.sender}</div>`:''}${m.text}<div class="msg-time">${m.time}</div></div>`;
    tc.appendChild(row);
  });
  setTimeout(()=>{tc.scrollTop=tc.scrollHeight},50);
  // analysis
  const ta=document.getElementById('tab-analysis');
  const col=scoreColor(c.score);
  const [fg,bg]=statusStyle(c.status);
  const pct=Math.round(c.score*10);
  let imps='';
  (c.improvements||[]).forEach(i=>{imps+=`<div class="imp-card ${i.type}"><div class="imp-title">${i.title}</div><div class="imp-text">${i.text}</div><div class="imp-tip">&#128161; ${i.tip}</div></div>`;});
  let objs='';
  (c.objecoes||[]).forEach(o=>{objs+=`<div class="objecao-card"><div class="ob-q">&#10067; ${o.objecao}</div><div class="ob-r"><strong>Deu:</strong> ${o.resposta_dada}</div><div class="ob-ideal"><strong>Ideal:</strong> ${o.resposta_ideal}</div></div>`;});
  ta.innerHTML=`
    <div class="score-block">
      <div class="score-num" style="color:${col}">${c.score}</div>
      <div class="score-info">
        <div class="score-label">${c.scoreLabel}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
    </div>
    <span class="status-badge" style="color:${fg};background:${bg}">${c.status}</span>
    <div class="summary-box">${c.summary}</div>
    ${imps?`<div class="section-title">Pontos de coaching</div><div class="improvements">${imps}</div>`:''}
    ${objs?`<div class="section-title">Objecoes identificadas</div>${objs}`:''}`;
  // followup
  const tf=document.getElementById('tab-followup');
  tf.innerHTML=c.followupMsg&&c.followupMsg!=='N/A'?`<div class="section-title">Mensagem sugerida</div><div class="followup-box">${c.followupMsg}</div>`:`<div style="color:var(--muted);font-size:13px">Sem follow-up sugerido para esta conversa.</div>`;
  switchTab('chat');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{const names=['chat','analysis','followup'];el.classList.toggle('active',names[i]===t)});
  document.querySelectorAll('.tab-panel').forEach(el=>{el.classList.toggle('active',el.id==='tab-'+t)});
  if(t==='chat'){const tc=document.getElementById('tab-chat');setTimeout(()=>{tc.scrollTop=tc.scrollHeight},50)}
}

function filterList(q){
  const f=q.toLowerCase();
  buildList(CONVS.filter(c=>c.chat.toLowerCase().includes(f)||c.produto.toLowerCase().includes(f)||c.vendedor.toLowerCase().includes(f)));
}

buildList(CONVS);

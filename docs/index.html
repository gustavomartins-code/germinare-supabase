<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesCoach AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --surface2: #1e2329;
    --border: #2a2f38;
    --text: #e8ecf0;
    --muted: #6b7a8d;
    --accent: #25d366;
    --accent2: #128c7e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --highlight: rgba(37,211,102,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 15px; letter-spacing: -0.3px;
  }
  .topbar-title span { color: var(--accent); }
  .topbar-meta { display: flex; gap: 16px; align-items: center; }
  .date-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px; color: var(--muted); font-weight: 500;
  }
  .seller-dropdown-wrap {
    position: relative;
  }
  .seller-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px 4px 6px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    user-select: none;
  }
  .seller-pill:hover { border-color: var(--accent); }
  .seller-pill.open { border-color: var(--accent); }
  .seller-pill-caret {
    font-size: 9px; color: var(--muted);
    transition: transform 0.2s;
    margin-left: 2px;
  }
  .seller-pill.open .seller-pill-caret { transform: rotate(180deg); }

  .seller-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #000;
    flex-shrink: 0;
  }

  .seller-menu {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 220px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 100;
    overflow: hidden;
    display: none;
    animation: menuIn 0.15s ease;
  }
  .seller-menu.open { display: block; }
  @keyframes menuIn {
    from { opacity:0; transform: translateY(-6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .seller-menu-header {
    padding: 10px 14px 8px;
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .seller-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }
  .seller-menu-item:hover { background: var(--surface2); }
  .seller-menu-item.active {
    background: rgba(37,211,102,0.08);
    border-left-color: var(--accent);
  }
  .seller-menu-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #000;
    flex-shrink: 0;
  }
  .seller-menu-info { flex: 1; min-width: 0; }
  .seller-menu-name { font-size: 13px; font-weight: 600; }
  .seller-menu-role { font-size: 10px; color: var(--muted); }
  .seller-menu-score {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 800;
  }
  .seller-menu-check { font-size: 12px; color: var(--accent); }

  .app-layout { display: flex; flex: 1; overflow: hidden; }

  .conv-list {
    width: 300px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .conv-list-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .conv-list-header h3 {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); margin-bottom: 10px;
  }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px;
  }
  .conv-items { flex: 1; overflow-y: auto; padding: 8px 0; }
  .conv-items::-webkit-scrollbar { width: 4px; }
  .conv-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .conv-item {
    padding: 12px 16px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--highlight); border-left-color: var(--accent); }
  .conv-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
  .conv-name { font-weight: 600; font-size: 14px; }
  .conv-time { font-size: 11px; color: var(--muted); }
  .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
  .conv-footer { display: flex; justify-content: space-between; align-items: center; }
  .score-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .score-good { background: rgba(37,211,102,0.15); color: var(--accent); }
  .score-mid { background: rgba(245,158,11,0.15); color: var(--warn); }
  .score-low { background: rgba(239,68,68,0.12); color: var(--danger); }
  .score-zero { background: rgba(107,122,141,0.15); color: var(--muted); }
  .tag-chips { display: flex; gap: 4px; }
  .tag-chip { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  .conv-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .conv-header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .conv-header-left { display: flex; align-items: center; gap: 12px; }
  .contact-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #3b4a6b, #5b7aaa);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .contact-info h4 { font-size: 14px; font-weight: 600; }
  .contact-info p { font-size: 11px; color: var(--muted); }
  .conv-header-actions { display: flex; gap: 8px; }
  .btn-sm {
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { opacity: 0.88; }

  .messages-area {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .day-sep { display: flex; align-items: center; gap: 10px; margin: 4px 0 8px; }
  .day-sep-line { flex: 1; height: 1px; background: var(--border); }
  .day-sep-label { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border); }

  .msg-row { display: flex; gap: 8px; max-width: 78%; }
  .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.received { align-self: flex-start; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 12px;
    font-size: 13.5px; line-height: 1.5;
    cursor: pointer; transition: all 0.2s;
  }
  .msg-row.sent .msg-bubble { background: #1d4a2e; border-bottom-right-radius: 3px; }
  .msg-row.received .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }

  .msg-bubble.hl-good { background: rgba(37,211,102,0.18) !important; border: 1.5px solid rgba(37,211,102,0.45) !important; }
  .msg-bubble.hl-warn { background: rgba(245,158,11,0.15) !important; border: 1.5px solid rgba(245,158,11,0.4) !important; }
  .msg-bubble.hl-bad { background: rgba(239,68,68,0.14) !important; border: 1.5px solid rgba(239,68,68,0.4) !important; }

  .insight-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
    margin-top: 6px; cursor: pointer; transition: opacity 0.15s;
  }
  .insight-tag:hover { opacity: 0.78; }
  .it-good { background: rgba(37,211,102,0.2); color: var(--accent); }
  .it-warn { background: rgba(245,158,11,0.2); color: var(--warn); }
  .it-bad { background: rgba(239,68,68,0.16); color: var(--danger); }

  .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; display: block; text-align: right; }

  .synthesis-panel {
    width: 290px; flex-shrink: 0;
    background: var(--surface);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .synth-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .synth-header h3 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }

  .score-ring-wrap { display: flex; align-items: center; gap: 14px; }
  .score-ring { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
  }
  .score-meta h4 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; }
  .score-meta p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .score-trend { font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

  .synth-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
  .synth-body::-webkit-scrollbar { width: 4px; }
  .synth-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .synth-section h5 { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .summary-text { font-size: 12.5px; line-height: 1.6; color: #b0bac6; }

  .improve-item {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; background: var(--surface2);
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden; margin-bottom: 8px;
  }
  .improve-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .improve-item.good::before { background: var(--accent); }
  .improve-item.warn::before { background: var(--warn); }
  .improve-item.bad::before { background: var(--danger); }
  .improve-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .improve-item.active-link { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(37,211,102,0.15); }

  .improve-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .improve-item-label { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .il-good { color: var(--accent); }
  .il-warn { color: var(--warn); }
  .il-bad { color: var(--danger); }
  .improve-item-arrow { font-size: 12px; color: var(--muted); transition: color 0.15s; }
  .improve-item:hover .improve-item-arrow { color: var(--accent); }
  .improve-title { font-size: 12.5px; font-weight: 600; margin-bottom: 4px; }
  .improve-text { font-size: 11.5px; color: var(--muted); line-height: 1.5; }
  .improve-link-msg { margin-top: 7px; font-size: 10.5px; color: var(--accent); display: flex; align-items: center; gap: 4px; opacity: 0.8; }

  .followup-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .followup-section h6 { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .followup-text { font-size: 12px; color: #b0bac6; line-height: 1.5; }
  .followup-copy { margin-top: 8px; font-size: 11px; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .followup-copy:hover { opacity: 0.8; }

  .metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .metric-card-label { font-size: 10px; color: var(--muted); font-weight: 500; }
  .metric-card-value { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; margin-top: 2px; }
  .mv-good { color: var(--accent); }
  .mv-warn { color: var(--warn); }
  .mv-bad { color: var(--danger); }
  .metric-card-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .objecao-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .objecao-label { font-size: 10px; font-weight: 700; color: var(--danger); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .objecao-text { font-size: 12px; color: #b0bac6; margin-bottom: 6px; }
  .objecao-ideal-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .objecao-ideal-text { font-size: 11.5px; color: var(--muted); line-height: 1.4; }

  .tooltip-popup {
    position: fixed; background: #1a1f28;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; max-width: 230px;
    z-index: 999; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none;
  }
  .tooltip-popup.visible { display: block; }
  .tooltip-popup h6 { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .tooltip-popup p { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .flash { animation: flash 0.4s 2; }
</style>
</head>

 "Mensagens", "value": "13", "cls": "", "sub": "total na conversa"}, {"label": "Produto", "value": "N/A", "cls": "", "sub": "N/A"}, {"label": "Status", "value": "Interno", "cls": "", "sub": "Operacional interno"}, {"label": "Vendedor", "value": "N/A", "cls": "", "sub": "responsavel"}], "improvements": [], "messages": [{"type": "sent", "text": "SPRINTIA01", "time": "18:57"}, {"type": "sent", "text": "[imagem]", "time": "18:59"}, {"type": "sent", "text": "buscar sobre VPS", "time": "19:03"}, {"type": "sent", "text": "easypainel", "time": "19:04"}, {"type": "sent", "text": "evolution api - add aplicativo na vps", "time": "19:06"}, {"type": "sent", "text": "VPS hostinger", "time": "19:09"}, {"type": "sent", "text": "- Avaliar recebimento as 7:00\n- ⁠Validar o arquivo\n- ⁠Verificar analise de audio\n- ⁠Migrar para VPS", "time": "19:39"}, {"type": "sent", "text": "Responder o formulario", "time": "19:39"}, {"type": "recv", "text": "[imagem]", "time": "10:44"}, {"type": "recv", "text": "BidPulse — Inteligência de Vendas em Tempo Real para o Agronegócio\n\nA Germinare opera uma mesa de vendas com 10 vendedores ativos, ~400 clientes e centenas de negociações acontecendo simultaneamente via WhatsApp todos os dias. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio já foi perdido.\n\nBidPulse é um sistema de inteligência comercial que captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo e acionável — sem que nenhum vendedor precise fazer nada diferente.\n\nO pipeline funciona em três estágios. O primeiro é um filtro estrutural que elimina conversas irrelevantes. O segundo usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real — menção a preço, volume, BID, proposta ou objeção. O terceiro avalia cada negociação individualmente, gerando um score de 0 a 10, identificando objeções levantadas, avaliando como o vendedor reagiu, e propondo uma mensagem de follow-up pronta para envio imediato.\n\nO resultado chega por e-mail com um resumo visual das negociações do dia e um link para um painel interativo onde o gestor consegue ler a transcrição completa de cada conversa, ver os pontos fortes e as falhas de cada vendedor destacados diretamente nas mensagens, e copiar o follow-up sugerido com um clique.\n\nO sistema já está em produção. Ontem, 13 de maio de 2026, processou 55 contatos, identificou 6 negociações reais e entregou o relatório com avaliação completa de cada uma — tudo de forma automática, sem intervenção humana, em menos de 5 minutos.\n\nO impacto direto é duplo: o gestor recupera negociações que estavam se perdendo em silêncio, e os vendedores recebem feedback específico e contextualizado sobre cada conversa — não uma avaliação genérica, mas uma análise do que foi dito, quando e como deveria ter sido diferente.", "time": "10:46"}, {"type": "sent", "text": "A Germinare opera intermediação de vendas com 10 agentes ativos e centenas de negociações acontecendo simultaneamente via WhatsApp diariamente. O problema: o gestor não tem visibilidade do que está acontecendo nas conversas até que o negócio ser concluído ou perdido.\n\nNossa solução, criada a partir do G4OS, captura automaticamente todas as conversas de WhatsApp dos vendedores, processa cada uma com IA e entrega, todas as manhãs, um relatório completo.\n\nO pipeline funciona em três estágios: \n1. Filtro estrutural que elimina conversas irrelevantes. \n2. ⁠Usa um modelo de linguagem para identificar, em lote, quais conversas contêm negociação real (menção a preço, volume, produto, BID, proposta ou objeção).\n3. ⁠ Avalia cada negociação individualmente, gerando um score de 0 a 10, identificando objeções levantadas, avaliando como o vendedor reagiu, com um resumo analítico sobre a negociação e propondo uma mensagem de follow-up pronta para envio imediato.\n4. ⁠Enviado por e-mail um consolidado visual das negociações do dia e um link para um painel interativo onde o gestor consegue ler a transcrição completa de cada conversa, ver os pontos fortes e as falhas de cada vendedor destacados diretamente nas mensagens, e o follow-up sugerido.\n\nO sistema já está em produção. Ontem, processou 55 contatos, identificou 6 negociações reais e entregou o relatório com avaliação completa de cada uma — tudo de forma automática, sem intervenção humana, em menos de 5 minutos.\n\nO impacto direto é duplo: o gestor recupera negociações que estavam se perdendo em silêncio, e os vendedores recebem feedback específico e contextualizado sobre cada conversa com oportunidade de desenvolvimento — não uma avaliação genérica, mas uma análise do que foi dito, quando e como deveria ter sido diferente.", "time": "10:55"}], "followupMsg": "N/A"}, {"id": 12, "name": "Gustavo Sorna", "initials": "GS", "avatarGrad": "linear-gradient(135deg,#3b4a6b,#5b7aaa)", "time": "17:27", "preview": "[imagem]", "score": 0.0, "msgs": 7, "duration": "7 msgs", "tags": ["Interno"], "scoreLabel": "Teste interno sistema", "scoreTrend": "abaixo da media", "trendColor": "var(--danger)", "scoreSubtitle": "Teste interno sistema", "arcOffset": 150.8, "arcColor": "#ef4444", "scoreColor": "var(--danger)", "summary": "Usuario testando funcionalidades de pitch e acesso ao sistema Evolution.", "metrics": [{"label": "Mensagens", "value": "7", "cls": "", "sub": "total na conversa"}, {"label": "Produto", "value": "N/A", "cls": "", "sub": "N/A"}, {"label": "Status", "value": "Interno", "cls": "", "sub": "Teste interno sistema"}, {"label": "Vendedor", "value": "N/A", "cls": "", "sub": "responsavel"}], "improvements": [], "messages": [{"type": "recv", "text": "Pi", "time": "15:08"}, {"type": "recv", "text": "Oi", "time": "15:08"}, {"type": "recv", "text": "https://canva.link/uyxtd5sy4v0158s", "time": "16:02"}, {"type": "sent", "text": "fala gustavo", "time": "17:23"}, {"type": "sent", "text": "em que posso te ajudar?", "time": "17:23"}, {" let activeSeller = 0;
let activeConv = 0;
let conversations = allConversations[0];

function scoreClass(s) {
  if(s <= 0) return 'score-zero';
  return s>=8?'score-good':s>=6?'score-mid':'score-low';
}

function renderSellerMenu() {
  document.getElementById('sellerMenuItems').innerHTML = sellers.map(s => `
    <div class="seller-menu-item ${s.id===activeSeller?'active':''}" onclick="selectSeller(${s.id})">
      <div class="seller-menu-avatar" style="background:${s.grad}">${s.initials}</div>
      <div class="seller-menu-info">
        <div class="seller-menu-name">${s.name}</div>
        <div class="seller-menu-role">${s.role}</div>
      </div>
      <div class="seller-menu-score" style="color:${s.avgScore>=8?'var(--accent)':s.avgScore>=6?'var(--warn)':'var(--danger)'}">
        ${s.avgScore}
      </div>
      ${s.id===activeSeller?'<div class="seller-menu-check">✓</div>':''}
    </div>`).join('');
}

function toggleSellerMenu() {
  const menu = document.getElementById('sellerMenu');
  const pill = document.getElementById('sellerPill');
  const isOpen = menu.classList.contains('open');
  menu.classList.toggle('open');
  pill.classList.toggle('open');
  if(!isOpen) renderSellerMenu();
}

function selectSeller(idx) {
  activeSeller = idx;
  conversations = allConversations[idx] || [];
  activeConv = 0;
  const s = sellers[idx];
  document.getElementById('topSellerAvatar').textContent = s.initials;
  document.getElementById('topSellerAvatar').style.background = s.grad;
  document.getElementById('topSellerName').textContent = s.name;
  document.getElementById('sellerMenu').classList.remove('open');
  document.getElementById('sellerPill').classList.remove('open');
  if(conversations.length > 0) selectConv(0);
  else {
    document.getElementById('convList').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">Nenhuma conversa hoje</div>';
    document.getElementById('messagesArea').innerHTML = '';
    document.getElementById('synthBody').innerHTML = '';
  }
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('sellerWrap');
  if(!wrap.contains(e.target)) {
    document.getElementById('sellerMenu').classList.remove('open');
    document.getElementById('sellerPill').classList.remove('open');
  }
});

function renderConvList() {
  document.getElementById('convList').innerHTML = conversations.map((c,i) => `
    <div class="conv-item ${i===activeConv?'active':''}" onclick="selectConv(${i})">
      <div class="conv-item-top">
        <div class="conv-name">${c.name}</div>
        <div class="conv-time">${c.time}</div>
      </div>
      <div class="conv-preview">${(c.preview||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <div class="conv-footer">
        <div class="score-badge ${scoreClass(c.score)}">${c.score>0?'⭐ '+c.score:'—'}</div>
        <div class="tag-chips">${(c.tags||[]).map(t=>`<div class="tag-chip">${t}</div>`).join('')}</div>
      </div>
    </div>`).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessages(conv) {
  const area = document.getElementById('messagesArea');
  if(!conv.messages || conv.messages.length === 0) {
    area.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:13px">Sem mensagens capturadas</div>';
    return;
  }
  area.innerHTML = `
    <div class="day-sep"><div class="day-sep-line"></div><div class="day-sep-label">13 de maio de 2026</div><div class="day-sep-line"></div></div>
    ${conv.messages.map((m,i)=>`
      <div class="msg-row ${m.type==='sent'?'sent':'received'}" id="msg-${i}">
        <div class="msg-bubble${m.hl?' hl-'+m.hl:''}"${m.itype!==undefined?` onclick="fromMsg(${m.ikey||0},${i})"`:''}>
          <span>${esc(m.text)}</span>
          ${m.itype!==undefined?`<div><div class="insight-tag it-${m.itype}" onclick="fromMsg(${m.ikey||0},${i})">${esc(m.ilabel)} →</div></div>`:''}
          <span class="msg-time">${m.time}</span>
        </div>
      </div>`).join('')}`;
}

function renderSynthesis(conv) {
  const arc = conv.arcOffset !== undefined ? conv.arcOffset : 75.4;
  const arcColor = conv.arcColor || '#25d366';
  const scoreColor = conv.scoreColor || 'var(--accent)';

  document.getElementById('scoreArc').style.stroke = arcColor;
  document.getElementById('scoreArc').setAttribute('stroke-dashoffset', arc);
  document.getElementById('scoreLabel').textContent = conv.score || '—';
  document.getElementById('scoreLabel').style.color = scoreColor;
  document.getElementById('scoreTitle').textContent = conv.scoreLabel || '';
  document.getElementById('scoreSubtitle').textContent = conv.scoreSubtitle || '';
  document.getElementById('scoreTrend').innerHTML = `<span style="color:${conv.trendColor||'var(--muted)'}">${esc(conv.scoreTrend||'')}</span>`;

  let html = '';

  // Síntese
  html += `
    <div class="synth-section">
      <h5>📋 Síntese</h5>
      <p class="summary-text">${esc(conv.summary||'')}</p>
    </div>`;

  // Métricas
  if(conv.metrics && conv.metrics.length) {
    html += `
    <div class="synth-section">
      <h5>📊 Métricas</h5>
      <div class="metrics-row">
        ${conv.metrics.map(m=>`<div class="metric-card"><div class="metric-card-label">${esc(m.label)}</div><div class="metric-card-value ${m.cls||''}">${esc(m.value)}</div><div class="metric-card-sub">${esc(m.sub||'')}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // Melhorias
  if(conv.improvements && conv.improvements.length) {
    html += `
    <div class="synth-section">
      <h5>💡 Pontos de Melhoria</h5>
      ${conv.improvements.map((imp,idx)=>`
        <div class="improve-item ${imp.type||'good'}" id="imp-${idx}" onclick="fromImp(${idx},${imp.msgIdx||0})">
          <div class="improve-item-header">
            <div class="improve-item-label ${imp.ilcls||'il-good'}">${esc(imp.label||'')}</div>
            <div class="improve-item-arrow">↗</div>
          </div>
          <div class="improve-title">${esc(imp.title||'')}</div>
          <div class="improve-text">${esc(imp.text||'')}</div>
          ${imp.tip?`<div class="improve-link-msg">🔗 Ver mensagem vinculada</div>`:''}
        </div>`).join('')}
    </div>`;
  }

  // Follow-up
  if(conv.followupMsg && conv.followupMsg !== 'N/A') {
    html += `
    <div class="synth-section">
      <h5>📤 Follow-up Sugerido</h5>
      <div class="followup-section">
        <p class="followup-text">${esc(conv.followupMsg)}</p>
        <div class="followup-copy" onclick="copyFollowup(${conv.id})">📋 Copiar mensagem</div>
      </div>
    </div>`;
  }

  document.getElementById('synthBody').innerHTML = html;
}

function selectConv(idx) {
  activeConv = idx;
  const c = conversations[idx];
  document.getElementById('convAvatar').textContent = c.initials || '??';
  document.getElementById('convAvatar').style.background = c.avatarGrad || 'linear-gradient(135deg,#3b4a6b,#5b7aaa)';
  document.getElementById('convContactName').textContent = c.name;
  document.getElementById('convContactSub').textContent = `${c.msgs} mensagens`;
  renderConvList();
  renderMessages(c);
  renderSynthesis(c);
  document.getElementById('messagesArea').scrollTop = 0;
}

function fromImp(impIdx, msgIdx) {
  document.querySelectorAll('.improve-item').forEach(e=>e.classList.remove('active-link'));
  const ie = document.getElementById('imp-'+impIdx);
  if(ie) ie.classList.add('active-link');
  const me = document.getElementById('msg-'+msgIdx);
  if(me) { me.scrollIntoView({behavior:'smooth',block:'center'}); me.classList.add('flash'); setTimeout(()=>me.classList.remove('flash'),900); }
}

function fromMsg(impIdx, msgIdx) {
  fromImp(impIdx, msgIdx);
  const ie = document.getElementById('imp-'+impIdx);
  if(ie) {
    ie.scrollIntoView({behavior:'smooth',block:'center'});
    const conv = conversations[activeConv];
    const imp = conv.improvements[impIdx];
    if(imp) {
      const me = document.getElementById('msg-'+msgIdx);
      const tt = document.getElementById('tooltip');
      if(me) {
        const r = me.getBoundingClientRect();
        document.getElementById('tooltipTitle').textContent = imp.title;
        document.getElementById('tooltipBody').textContent = imp.tip;
        tt.style.left = Math.min(r.right+8, window.innerWidth-245)+'px';
        tt.style.top = r.top+'px';
        tt.classList.add('visible');
        setTimeout(()=>tt.classList.remove('visible'),4000);
      }
    }
  }
}

function copyFollowup(convId) {
  const conv = conversations.find(c=>c.id===convId);
  if(conv && conv.followupMsg) {
    navigator.clipboard.writeText(conv.followupMsg).then(()=>{
      const btn = event.target;
      btn.textContent = '✓ Copiado!';
      setTimeout(()=>btn.textContent='📋 Copiar mensagem', 2000);
    });
  }
}

selectSeller(0);
</script>
</body>
</html>
